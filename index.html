<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Language Translator</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-4xl rounded-2xl shadow-xl p-6 md:p-8">

    <div class="text-center mb-6">

        <h1 class="text-3xl font-bold text-indigo-700 flex justify-center items-center gap-2">
            <i class="fa-solid fa-language"></i>
            AI Language Translator
        </h1>

        <p class="text-gray-500 mt-2">
            English ⇄ Hindi Translator
        </p>

    </div>


    <div class="flex flex-col sm:flex-row items-center gap-4 mb-6">

        <div class="w-full">

            <label class="text-sm font-semibold text-gray-600">
                From
            </label>

            <select
                id="sourceLang"
                class="w-full mt-1 border rounded-lg p-3 outline-none focus:border-indigo-600">

                <option value="en-GB" selected>
                    English
                </option>

                <option value="hi-IN">
                    Hindi
                </option>

            </select>

        </div>


        <button
            id="swapBtn"
            class="mt-6 bg-indigo-600 hover:bg-indigo-700 text-white w-12 h-12 rounded-full">

            <i class="fa-solid fa-arrows-rotate"></i>

        </button>


        <div class="w-full">

            <label class="text-sm font-semibold text-gray-600">
                To
            </label>

            <select
                id="targetLang"
                class="w-full mt-1 border rounded-lg p-3 outline-none focus:border-indigo-600">

                <option value="hi-IN" selected>
                    Hindi
                </option>

                <option value="en-GB">
                    English
                </option>

            </select>

        </div>

    </div>



    <div class="grid md:grid-cols-2 gap-6">

        <div class="border rounded-xl">

            <textarea
                id="sourceText"
                maxlength="5000"
                rows="8"
                placeholder="Enter text..."
                class="w-full p-4 resize-none outline-none rounded-t-xl"></textarea>

            <div class="flex justify-between items-center border-t p-3 bg-gray-50 rounded-b-xl">

                <div class="space-x-4">

                    <button id="copySource">

                        <i class="fa-solid fa-copy"></i>

                    </button>

                    <button id="speakSource">

                        <i class="fa-solid fa-volume-high"></i>

                    </button>

                </div>

                <span
                    id="charCount"
                    class="text-sm text-gray-500">

                    0 / 5000

                </span>

            </div>

        </div>



        <div class="border rounded-xl bg-gray-50">

            <textarea
                id="targetText"
                rows="8"
                readonly
                placeholder="Translation..."
                class="w-full p-4 resize-none outline-none bg-transparent rounded-t-xl"></textarea>

            <div class="flex justify-start gap-4 border-t p-3 rounded-b-xl">

                <button id="copyTarget">

                    <i class="fa-solid fa-copy"></i>

                </button>

                <button id="speakTarget">

                    <i class="fa-solid fa-volume-high"></i>

                </button>

            </div>

        </div>

    </div>


    <button
        id="translateBtn"
        class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl flex justify-center items-center gap-2">

        <span id="btnText">

            Translate

        </span>

        <div
            id="btnLoader"
            class="hidden animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent">

        </div>

    </button>

</div>

<script src="script.js"></script>

</body>
</html>
